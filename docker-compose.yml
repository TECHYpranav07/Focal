version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - backend-uploads:/app/uploads
    environment:
      - UPLOAD_DIR=/app/uploads
      - DATABASE_URL=sqlite+aiosqlite:////app/uploads/focal.db
      - CORS_ORIGINS=*

  web:
    image: node:18-alpine
    working_dir: /app
    volumes:
      - ./web:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
    command: sh -c "npm install && npm run dev -- --host"

volumes:
  backend-uploads:
